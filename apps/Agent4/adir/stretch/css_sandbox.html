<!DOCTYPE html><html><head><style>:root { --bg-primary: #0a0e27; --bg-secondary: #111638; --bg-tertiary: #161b42; --accent: #00d9ff; --accent-dim: rgba(0, 217, 255, 0.15); --text-primary: #e0e6f0; --text-secondary: #8892b0; --text-muted: #5a6380; --border: rgba(255, 255, 255, 0.08); --success: #00e676; --warning: #ffab40; --danger: #ff5252; } body { background: var(--bg-primary); color: var(--text-primary); font-family: sans-serif; height: 2000px; margin: 0; padding: 20px; } .pinned-ui { position: fixed !important; top: 15px !important; right: 15px !important; width: 260px; background: var(--bg-secondary); border: 1px solid var(--accent); box-shadow: 0 0 20px var(--accent-dim); z-index: 10000; padding: 15px; border-radius: 8px; } table { width: 100%%; border-collapse: collapse; font-family: monospace; font-size: 0.8em; } td { border-bottom: 1px solid var(--border); padding: 5px 0; } .swatch { display: inline-block; width: 10px; height: 10px; margin-right: 8px; border-radius: 2px; }</style></head><body><div class="pinned-ui"><h4 style="color: var(--accent); margin: 0 0 10px 0;">Live Sandbox Preview</h4><table><tr><td><span class="swatch" style="background:#0a0e27"></span>--bg-primary</td><td>#0a0e27</td></tr><tr><td><span class="swatch" style="background:#00d9ff"></span>--accent</td><td>#00d9ff</td></tr><tr><td><span class="swatch" style="background:#00e676"></span>--success</td><td>#00e676</td></tr></table></div><h3 style="color: var(--accent);">Token Set Injected</h3><p>The color variables are now active. Scroll down to verify the pinning logic.</p></body></html>
