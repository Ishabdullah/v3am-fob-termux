        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            logDiv.style.display = 'block';
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateProgress(percent, text) {
            const fill = document.getElementById('progressFill');
            fill.style.width = percent + '%';
            fill.textContent = text || (percent + '%');
        }

        async function buildSite() {
            const btn = document.getElementById('buildBtn');
            btn.disabled = true;
            document.getElementById('progressContainer').style.display = 'block';

            log('Starting Site Weaver build...', 'info');
            updateProgress(5, 'Initializing...');

            const zip = new JSZip();
            const pagesFolder = zip.folder('pages');

            // Create site.json
            const siteJson = {
                id: 'v3am-complete-documentation',
                name: 'V3AM Complete Documentation',
                theme: {},
                defaultTemplate: 'default'
            };
            zip.file('site.json', JSON.stringify(siteJson, null, 2));
            log('Created site.json', 'success');

            // Create index.json
            const indexData = {
                rootId: 'home',
                pages: {}
            };

            // Add homepage
            indexData.pages['home'] = {
                id: 'home',
                title: siteStructure.home.title,
                summary: siteStructure.home.summary
            };

            // Add all sections
            let prevId = 'home';
            siteStructure.sections.forEach((section, index) => {
                indexData.pages[section.id] = {
                    id: section.id,
                    title: section.title,
                    summary: section.summary,
                    parentId: prevId
                };
                prevId = section.id;
            });

            zip.file('index.json', JSON.stringify(indexData, null, 2));
            log('Created index.json with ' + (siteStructure.sections.length + 1) + ' pages', 'success');
            updateProgress(10, 'Building pages...');

            // Generate homepage
            log('Generating homepage...', 'info');
            const homeHTML = generateHomepage();
            pagesFolder.file('home.html', homeHTML);
            updateProgress(20, 'Homepage complete');

            // Generate all section pages
            for (let i = 0; i < siteStructure.sections.length; i++) {
                const section = siteStructure.sections[i];
                const progress = 20 + ((i + 1) / siteStructure.sections.length) * 70;

                log(`Generating ${section.title}...`, 'info');
                updateProgress(progress, `Building: ${section.title}`);

                const pageHTML = section.content(section, i, siteStructure.sections);
                pagesFolder.file(`${section.id}.html`, pageHTML);
            }

            log('All pages generated successfully', 'success');
            updateProgress(95, 'Creating ZIP file...');

            // Generate and download zip
            try {
                const blob = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `v3am-complete-docs-${new Date().toISOString().split('T')[0]}.zip`;
                a.click();
                URL.revokeObjectURL(url);

                log('Site Weaver build complete! Download started.', 'success');
                updateProgress(100, 'Complete!');
            } catch (error) {
                log('Error creating ZIP: ' + error.message, 'error');
            }

            btn.disabled = false;
        }

        function getNavigation(currentId, sections) {
            const currentIndex = sections.findIndex(s => s.id === currentId);
            let nav = '<div class="page-navigation"><a href="home.html" class="nav-link">🏠 Home</a>';

            if (currentIndex > 0) {
                const prev = sections[currentIndex - 1];
                nav += `<a href="${prev.id}.html" class="nav-link">← ${prev.title}</a>`;
            }

            if (currentIndex < sections.length - 1) {
                const next = sections[currentIndex + 1];
                nav += `<a href="${next.id}.html" class="nav-link">${next.title} →</a>`;
            }

            nav += '</div>';
            return nav;
        }
