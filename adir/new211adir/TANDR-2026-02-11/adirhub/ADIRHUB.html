<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADIR Hub - Command Center</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0e17; --surface: #131a2b; --surface2: #1a2340;
            --border: #243050; --text: #c8d6e5; --text-dim: #6b7c93;
            --accent: #00d4ff; --accent2: #7c5cff; --green: #00e676;
            --yellow: #ffd740; --red: #ff5252; --orange: #ff9100;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* TOP BAR */
        .topbar { display: flex; align-items: center; padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border); gap: 12px; flex-shrink: 0; }
        .topbar h1 { font-size: 16px; color: var(--accent); letter-spacing: 2px; cursor: pointer; }
        .topbar h1:hover { color: #fff; }
        #status-bar { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
        .svc { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-family: monospace; }
        .svc-on { background: rgba(0,230,118,0.15); color: var(--green); border: 1px solid rgba(0,230,118,0.3); }
        .svc-off { background: rgba(255,82,82,0.1); color: var(--red); border: 1px solid rgba(255,82,82,0.2); }

        /* LAYOUT */
        .layout { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
        .nav-header { padding: 8px 12px; font-size: 11px; font-weight: 700; color: var(--accent); cursor: pointer; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
        .nav-header:hover { background: var(--surface2); }
        .nav-app { padding: 4px 12px 4px 16px; font-size: 12px; cursor: pointer; color: var(--text); }
        .nav-app:hover { background: var(--surface2); color: #fff; }
        .nav-item { padding: 3px 12px 3px 28px; font-size: 11px; cursor: pointer; color: var(--text-dim); }
        .nav-item:hover { background: var(--surface2); color: var(--accent); }
        .nav-item.dim { cursor: default; font-style: italic; }

        /* MAIN CONTENT */
        .main { flex: 1; overflow-y: auto; padding: 20px; }

        /* DASHBOARD VIEW */
        #view-dashboard h2 { font-size: 14px; color: var(--accent); margin-bottom: 12px; letter-spacing: 1px; }
        #cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: pointer; transition: border-color 0.2s; }
        .card:hover { border-color: var(--accent); }
        .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .card-name { font-weight: 600; font-size: 13px; }
        .card-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; letter-spacing: 0.5px; }
        .status-ready { background: rgba(0,230,118,0.15); color: var(--green); }
        .status-partial { background: rgba(255,215,64,0.15); color: var(--yellow); }
        .status-none { background: rgba(255,82,82,0.1); color: var(--red); }
        .card-type { font-size: 10px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .card-actions { display: flex; gap: 6px; }
        .btn-sm { font-size: 10px; padding: 3px 8px; background: var(--surface2); border: 1px solid var(--border); color: var(--accent); border-radius: 4px; cursor: pointer; }
        .btn-sm:hover { background: var(--border); }

        /* QUICK LINKS */
        .quick-links { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
        .qlink { font-size: 11px; padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--accent); text-decoration: none; cursor: pointer; }
        .qlink:hover { background: var(--surface2); border-color: var(--accent); color: #fff; }

        /* FILE VIEWER */
        #view-file { display: none; }
        .file-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .file-toolbar button { font-size: 11px; padding: 4px 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--accent); border-radius: 4px; cursor: pointer; }
        .file-toolbar button:hover { background: var(--border); }
        .file-toolbar .btn-save { background: rgba(0,212,255,0.15); border-color: var(--accent); }
        #file-path { font-size: 11px; color: var(--text-dim); font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #file-meta { font-size: 10px; color: var(--text-dim); margin-bottom: 12px; }
        #file-content { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; min-height: 400px; overflow: auto; }
        #file-content textarea { width: 100%; min-height: 500px; background: transparent; border: none; color: var(--text); font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; line-height: 1.6; resize: vertical; outline: none; }

        /* MARKDOWN RENDER */
        .md-render { font-size: 13px; line-height: 1.7; }
        .md-render h1 { font-size: 18px; color: var(--accent); margin: 16px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
        .md-render h2 { font-size: 15px; color: var(--accent2); margin: 12px 0 6px; }
        .md-render h3 { font-size: 13px; color: var(--yellow); margin: 10px 0 4px; }
        .md-render strong { color: #fff; }
        .md-render code { background: var(--surface2); padding: 1px 4px; border-radius: 3px; font-size: 12px; color: var(--green); }
        .md-render pre { background: var(--bg); padding: 12px; border-radius: 6px; margin: 8px 0; overflow-x: auto; }
        .md-render pre code { background: none; padding: 0; }
        .md-render a { color: var(--accent); text-decoration: none; }
        .md-render a:hover { text-decoration: underline; }
        .md-render table { border-collapse: collapse; margin: 8px 0; width: 100%; }
        .md-render td { border: 1px solid var(--border); padding: 4px 8px; font-size: 12px; }
        .md-render hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
        .md-render p { margin: 4px 0; }
        .error { color: var(--red); padding: 20px; }

        /* TOAST */
        #toast { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: #000; padding: 8px 16px; border-radius: 6px; font-size: 12px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        #toast.show { opacity: 1; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

    <!-- TOP BAR -->
    <div class="topbar">
        <h1 onclick="showDashboard()">ADIR HUB</h1>
        <div id="status-bar">Loading services...</div>
    </div>

    <!-- LAYOUT -->
    <div class="layout">

        <!-- SIDEBAR -->
        <div class="sidebar" id="nav-tree">Loading...</div>

        <!-- MAIN -->
        <div class="main">

            <!-- DASHBOARD VIEW -->
            <div id="view-dashboard">
                <h2>QUICK LINKS</h2>
                <div class="quick-links">
                    <!-- FOB Thin Client Services (Updated 2026-03-13) -->
                    <a class="qlink" href="http://127.0.0.1:9220/" target="_blank">📚 KB-Maker v2</a>
                    <a class="qlink" href="http://127.0.0.1:9210/" target="_blank">🚀 Agent-Dropper v2</a>
                    <a class="qlink" href="http://127.0.0.1:8086/" target="_blank">🔧 TANDRmgr-lab</a>
                    <a class="qlink" href="http://127.0.0.1:10336/" target="_blank">🤖 GGBOT</a>
                    <a class="qlink" href="http://127.0.0.1:8091/" target="_blank">💾 Memory Bot</a>
                    <a class="qlink" href="http://127.0.0.1:11434/api/tags" target="_blank">🧠 Ollama Models</a>
                </div>

                <h2>PROJECTS</h2>
                <div id="cards">Loading...</div>
            </div>

            <!-- FILE VIEWER -->
            <div id="view-file">
                <div class="file-toolbar">
                    <button onclick="showDashboard()">BACK</button>
                    <span id="file-path"></span>
                    <button id="btn-edit" onclick="toggleEdit()">EDIT</button>
                    <button id="btn-save" class="btn-save" onclick="saveFile()" style="display:none">SAVE</button>
                </div>
                <div id="file-meta"></div>
                <div id="file-content"></div>
            </div>

        </div>
    </div>

    <div id="toast"></div>
    <script src="js/adirhub.js"></script>
    <!-- ngrok auto-detection removed (not used in FOB thin client) -->
</body>
</html>
