<!DOCTYPE html><html><head><style>body{margin:0;font-family:sans-serif;background:#0a0a1a;color:#00d4ff;overflow:hidden;}#toolbar{display:flex;padding:8px;background:#1a1a3a;gap:8px;align-items:center;border-bottom:1px solid #00d4ff;}input{flex:1;background:#000;border:1px solid #00d4ff;color:#00ff9d;padding:4px 8px;border-radius:4px;}button{background:#00d4ff;color:#000;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;font-weight:bold;}button:hover{background:#00ff9d;}#viewport{width:100vw;height:calc(100vh - 45px);border:none;background:#fff;}.bookmark{font-size:10px;color:#888;text-decoration:none;border:1px solid #333;padding:2px 4px;}</style></head> 
<body><div id="toolbar"><button onclick="history.back()">&#8592;</button><button onclick="history.forward()">&#8594;</button><input type="text" id="urlInput" value="http://127.0.0.1:11111/" onkeydown="if(event.key==='Enter')loadUrl()"><button onclick="loadUrl()">GO</button><a href="#" class="bookmark" onclick="setAndLoad('http://127.0.0.1:11111/')">A1</a><a href="#" class="bookmark" onclick="setAndLoad('http://127.0.0.1:11112/')">A2</a><a href="#" class="bookmark" onclick="setAndLoad('http://127.0.0.1:9303/')">HUB</a></div><iframe id="viewport" src="http://127.0.0.1:11111/"></iframe> 
<script>function loadUrl(){const url=document.getElementById('urlInput').value;document.getElementById('viewport').src=url;}function setAndLoad(url){document.getElementById('urlInput').value=url;loadUrl();}</script></body></html>
